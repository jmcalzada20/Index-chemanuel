<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel de Jose Manuel</title>
    <style>
        :root {
            /* Colores Modernos y Claros */
            --bg-page: #f0f4f8;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent-color: #007bff;
            --text-main: #2d3436;
            --text-dim: #636e72;
            --highlight-bg: rgba(0, 123, 255, 0.1);
            --ai-accent: #6c5ce7;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 { 
            font-weight: 600; 
            font-size: 1.6rem; 
            margin: 0; 
            color: var(--text-main);
        }

        #clock { 
            font-size: 3.5rem; 
            font-weight: 700; 
            margin: 5px 0;
            color: var(--accent-color);
            letter-spacing: -1px;
        }

        /* Buscador Moderno */
        .search-area {
            position: relative;
            max-width: 600px;
            margin: 0 auto 40px;
            display: flex;
            gap: 10px;
        }

        .search-box {
            width: 100%;
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            color: var(--text-main);
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            background: #fff;
            border-color: var(--accent-color);
            box-shadow: 0 10px 30px rgba(0,123,255,0.1);
        }

        .ai-btn-quick {
            background: var(--ai-accent);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
            flex-shrink: 0;
        }

        /* Secciones */
        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(0,0,0,0.05);
            padding-bottom: 8px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
        }

        /* Grid de Enlaces */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 40px;
        }

        @media (min-width: 600px) {
            .links-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        }

        /* Tarjetas de Enlace */
        .link-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .link-card:hover {
            transform: translateY(-5px);
            background: #fff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            border-color: var(--accent-color);
        }

        .favicon-wrapper {
            width: 50px;
            height: 50px;
            background: #f8f9fa;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            padding: 10px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }

        .favicon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .link-name {
            font-size: 0.95rem;
            font-weight: 600;
        }

        /* Controles */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .btn {
            background: white;
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 8px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
        }

        #aiPanel {
            display: none;
            background: #fff;
            border: 1px solid var(--ai-accent);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="clock">00:00</div>
        <h1 id="greeting">Buenos días, Jose Manuel</h1>
    </header>

    <div class="search-area">
        <form action="https://www.google.com/search" method="get" style="flex:1">
            <input type="text" name="q" id="mainSearch" class="search-box" placeholder="¿Qué estás buscando?" autofocus>
        </form>
        <button class="ai-btn-quick" id="askAI" title="Preguntar a IA">✨</button>
    </div>

    <div id="aiPanel">
        <div style="font-weight: 800; color: var(--ai-accent); margin-bottom: 10px; font-size: 0.8rem; text-transform: uppercase;">Respuesta de IA</div>
        <div id="aiContent" style="font-size: 1rem; line-height: 1.5;"></div>
    </div>

    <div class="section-header">
        <span class="section-title">Accesos Rápidos</span>
    </div>

    <div class="controls">
        <button class="btn" id="toggleEdit">Organizar</button>
        <button class="btn" id="openAddModal" style="background: #e1f5fe; color: #01579b; border: none;">Añadir Enlace +</button>
    </div>

    <div class="links-grid" id="mainGrid">
        <!-- Los enlaces se inyectan mediante JS -->
    </div>
</div>

<script>
    // Lista de enlaces con WhatsApp Web incluido
    let links = JSON.parse(localStorage.getItem('jm_links_light')) || [
        { name: "WhatsApp", url: "https://web.whatsapp.com" },
        { name: "Gemini AI", url: "https://gemini.google.com" },
        { name: "Outlook", url: "https://outlook.cloud.microsoft/" },
        { name: "Soporte", url: "https://acavalmadrid.sharepoint.com/sites/SISTEMAS-TEAMS/SitePages/Soporte%20a%20Usuarios.aspx" },
        { name: "Google", url: "https://www.google.com" },
        { name: "YouTube", url: "https://www.youtube.com" }
    ];

    const apiKey = ""; // La clave se inyecta en el entorno de ejecución

    async function callGemini(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || "No pude obtener una respuesta.";
        } catch (e) { return "Error de conexión con la IA."; }
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        links.forEach((link, index) => {
            const domain = new URL(link.url).hostname;
            const icon = `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;
            
            const card = document.createElement('a');
            card.className = 'link-card';
            card.href = link.url;
            card.target = "_blank";
            card.innerHTML = `
                <div class="favicon-wrapper"><img src="${icon}"></div>
                <span class="link-name">${link.name}</span>
            `;
            grid.appendChild(card);
        });
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
        
        const hour = now.getHours();
        let greeting = "Buenos días";
        if (hour >= 13) greeting = "Buenas tardes";
        if (hour >= 21) greeting = "Buenas noches";
        document.getElementById('greeting').innerText = `${greeting}, Jose Manuel`;
    }

    document.getElementById('askAI').onclick = async () => {
        const query = document.getElementById('mainSearch').value;
        if (!query) return;
        
        const panel = document.getElementById('aiPanel');
        const content = document.getElementById('aiContent');
        
        panel.style.display = 'block';
        content.innerText = "Pensando...";
        content.innerText = await callGemini(query);
    };

    setInterval(updateTime, 1000);
    updateTime();
    render();
</script>
</body>
</html>
