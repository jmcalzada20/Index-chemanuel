<html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Padel Pro Arena - Jose Manuel</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --padel-blue: #1b4f72; 
            --padel-grass: #2874a6;
            --padel-lines: rgba(255, 255, 255, 0.9);
            --racket-color: #2c3e50;
            --ball-color: #d4f804;
            --glass-panel: rgba(255, 255, 255, 0.95);
            --text-main: #1b2631;
            --card-size: 160px;
        }

        body {
            margin: 0;
            padding: 20px 10px;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--padel-blue);
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px),
                radial-gradient(circle at center, var(--padel-grass) 0%, var(--padel-blue) 100%);
            background-size: 20px 20px, 20px 20px, 100% 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        .court-line { position: fixed; background: var(--padel-lines); z-index: 0; pointer-events: none; }
        .line-v { width: 4px; height: 100vh; top: 0; left: 50%; transform: translateX(-50%); opacity: 0.5; }
        .line-h { width: 100vw; height: 4px; top: 50%; left: 0; transform: translateY(-50%); opacity: 0.5; }
        
        .container { width: 100%; max-width: 1000px; z-index: 10; position: relative; }

        header { text-align: center; margin-bottom: 20px; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        #clock { font-size: 4.5rem; font-weight: 900; letter-spacing: -3px; margin: 0; line-height: 1; }
        #greeting { font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }

        .debug-ball {
            position: fixed; top: 15px; right: 15px; width: 25px; height: 25px;
            background: var(--ball-color); border-radius: 50%; opacity: 0.15;
            cursor: pointer; z-index: 100; transition: 0.3s;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.2); overflow: hidden;
        }
        .debug-ball:hover { opacity: 0.8; transform: rotate(15deg) scale(1.1); }
        .debug-ball .seam { position: absolute; width: 100%; height: 100%; border: 1px solid rgba(255,255,255,0.6); border-radius: 50%; }
        .debug-ball .seam-1 { top: -50%; left: -20%; }
        .debug-ball .seam-2 { bottom: -50%; right: -20%; }

        .search-box {
            background: var(--glass-panel); backdrop-filter: blur(10px);
            border-radius: 50px; padding: 15px 25px;
            display: flex; align-items: center; margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 2px dashed transparent; transition: 0.3s;
        }
        .search-box.drag-over { border-color: var(--ball-color); background: white; transform: scale(1.02); }
        .search-box input { flex: 1; border: none; background: transparent; font-size: 1.1rem; outline: none; color: var(--text-main); width: 100%; }

        .section-header {
            color: white; font-weight: 800; font-size: 0.9rem; text-transform: uppercase;
            letter-spacing: 2px; margin: 25px 0 15px 10px; display: flex; align-items: center; gap: 10px;
        }
        .section-header span { outline: none; padding: 4px 10px; border-radius: 8px; transition: 0.3s; border: 1px solid transparent; }
        .editing .section-header span { background: rgba(255,255,255,0.2); cursor: text; border: 1px dashed rgba(255,255,255,0.5); }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--card-size), 1fr));
            gap: 15px; justify-items: center;
            min-height: 120px; border-radius: 25px; padding: 15px;
            transition: 0.3s;
        }
        .links-grid.drag-over { background: rgba(255,255,255,0.15); outline: 2px dashed var(--ball-color); }

        .link-card {
            background: var(--glass-panel); border-radius: 25px; padding: 15px;
            text-decoration: none; color: var(--text-main); width: 85%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.2s;
            border: 2px solid transparent; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            position: relative; aspect-ratio: 1/1.2;
            cursor: grab; user-select: none;
        }
        .link-card.dragging { opacity: 0.3; transform: scale(0.9); border: 2px dashed var(--padel-blue); }

        .ball-icon {
            width: 70px; height: 70px; background: var(--ball-color);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            position: relative; margin-bottom: 12px; 
            box-shadow: inset -4px -6px 12px rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.2);
            pointer-events: none; overflow: hidden;
        }
        .ball-icon .seam { position: absolute; width: 110%; height: 110%; border: 2px solid rgba(255, 255, 255, 0.8); border-radius: 50%; }
        .ball-icon .seam-1 { top: -55%; left: -15%; transform: rotate(15deg); }
        .ball-icon .seam-2 { bottom: -55%; right: -15%; transform: rotate(15deg); }

        .racket-icon-container { position: relative; width: 70px; height: 90px; display: flex; flex-direction: column; align-items: center; margin-bottom: 8px; pointer-events: none; }
        .racket-head { width: 70px; height: 70px; background: var(--racket-color); border-radius: 40% 40% 45% 45%; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); position: relative; border: 2px solid #444; }
        .racket-handle { width: 12px; height: 20px; background: #222; border-bottom-left-radius: 5px; border-bottom-right-radius: 5px; }

        .icon-img { width: 30px; height: 30px; object-fit: contain; z-index: 5; border-radius: 6px; background: white; padding: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .link-title { font-weight: 800; font-size: 0.85rem; text-align: center; width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 5px; pointer-events: none; }
        
        .edit-controls { position: absolute; top: -5px; right: -5px; display: none; flex-direction: column; gap: 5px; z-index: 30; }
        .editing .edit-controls { display: flex; }
        .edit-btn { background: #003a70; color: white; border: 2px solid white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn-del { background: #ff4757; }

        .actions { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin: 40px 0; }
        .btn-action { background: rgba(255,255,255,0.15); border: 2px solid white; color: white; padding: 10px 20px; border-radius: 12px; font-weight: 800; cursor: pointer; backdrop-filter: blur(5px); transition: 0.2s; }
        .btn-action:hover { background: white; color: var(--padel-blue); }

        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; color: #333; }
        .modal-content input, .modal-content select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 2px solid #eee; box-sizing: border-box; font-size: 1rem; }

        .drop-hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--ball-color); color: var(--padel-blue); padding: 12px 30px; border-radius: 30px; font-weight: 900; display: none; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 2px solid white; pointer-events: none; }
        body.dragging-external .drop-hint { display: block; }
    </style>
</head>
<body id="padelBody" class="">

    <div class="debug-ball" title="Exportar configuración" onclick="exportCurrentState()">
        <div class="seam seam-1"></div>
        <div class="seam seam-2"></div>
    </div>

    <div class="court-line line-v"></div>
    <div class="court-line line-h"></div>
    <div class="drop-hint">¡SUELTA PARA GUARDAR! 🎾</div>

    <div class="container">
        <header>
            <div id="clock">13:10</div>
            <div id="greeting">Jose Manuel - Padel Pro</div>
        </header>

        <div class="search-box">
            <input type="text" id="mainSearch" placeholder="Busca o arrastra aquí un enlace...">
        </div>

        <div class="section-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="award" aria-hidden="true" class="lucide lucide-award"><path d="m15.477 12.89 1.515 8.526a.5.5 0 0 1-.81.47l-3.58-2.687a1 1 0 0 0-1.197 0l-3.586 2.686a.5.5 0 0 1-.81-.469l1.514-8.526"></path><circle cx="12" cy="8" r="6"></circle></svg> 
            <span id="labelFeatured" spellcheck="false" contenteditable="false">Destacados VIP (Pelotas)</span>
        </div>
        <div class="links-grid" id="gridFeatured" data-type="feat"><div class="link-card" draggable="true" data-index="0" data-type="feat"><div class="ball-icon"><div class="seam seam-1"></div><div class="seam seam-2"></div><img class="icon-img" src="https://www.google.com/s2/favicons?sz=128&amp;domain=compras.abonoteatro.com" onerror="this.src='https://img.icons8.com/fluency/48/tennis.png'"></div><div class="link-title">Abono Teatro</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div><div class="link-card" draggable="true" data-index="1" data-type="feat"><div class="ball-icon"><div class="seam seam-1"></div><div class="seam seam-2"></div><img class="icon-img" src="https://www.google.com/s2/favicons?sz=128&amp;domain=gemini.google.com" onerror="this.src='https://img.icons8.com/fluency/48/tennis.png'"></div><div class="link-title">Gemini</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div></div>

        <div class="section-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="grid" aria-hidden="true" class="lucide lucide-grid"><rect width="18" height="18" x="3" y="3" rx="2"></rect><path d="M3 9h18"></path><path d="M3 15h18"></path><path d="M9 3v18"></path><path d="M15 3v18"></path></svg> 
            <span id="labelGeneral" spellcheck="false" contenteditable="false">General (Palas)</span>
        </div>
        <div class="links-grid" id="gridGeneral" data-type="gen"><div class="link-card" draggable="true" data-index="0" data-type="gen"><div class="racket-icon-container"><div class="racket-head"><img class="icon-img" src="https://www.google.com/s2/favicons?sz=128&amp;domain=acavalmadrid.sharepoint.com" onerror="this.src='https://img.icons8.com/fluency/48/tennis.png'"></div><div class="racket-handle"></div></div><div class="link-title">Soporte</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div></div>

        <div class="actions">
            <button class="btn-action" id="openAdd">Añadir Marcador</button>
            <button class="btn-action" id="toggleEdit" style="background: rgba(255, 255, 255, 0.15); color: white;">Editar Panel</button>
        </div>
    </div>

    <div id="modal" style="display: none;">
        <div class="modal-content">
            <h3 id="modalTitle">Editar Marcador</h3>
            <input type="text" id="addName" placeholder="Nombre">
            <input type="text" id="addUrl" placeholder="URL">
            <select id="addType"><option value="feat">Destacados VIP (Pelotas)</option><option value="gen">General (Palas)</option></select>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-action" style="background:var(--padel-blue); border:none; flex:1" id="saveBtn">Guardar</button>
                <button class="btn-action" style="color:#666; border-color:#ccc; flex:1" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

<script>
    let isEditing = false;
    let editTarget = null;
    let draggedElement = null;
    let isProcessingDrop = false; // Bloqueo para evitar duplicados
    
    let featured = JSON.parse(localStorage.getItem('jm_p_feat')) || [
        { name: "Playtomic", url: "https://playtomic.io" },
        { name: "Soporte", url: "https://acavalmadrid.sharepoint.com/sites/SISTEMAS-TEAMS" }
    ];
    let general = JSON.parse(localStorage.getItem('jm_p_gen')) || [
        { name: "Gestor SAT", url: "https://sat.avalmadrid.es:9090/" },
        { name: "Avalmadrid", url: "https://www.avalmadrid.es" }
    ];
    let sectionLabels = JSON.parse(localStorage.getItem('jm_p_labels')) || { feat: "Destacados VIP", gen: "General" };

    function render() {
        const fg = document.getElementById('gridFeatured');
        const gg = document.getElementById('gridGeneral');
        
        fg.innerHTML = ''; gg.innerHTML = '';
        document.getElementById('labelFeatured').innerText = sectionLabels.feat;
        document.getElementById('labelGeneral').innerText = sectionLabels.gen;

        document.getElementById('padelBody').classList.toggle('editing', isEditing);
        document.getElementById('labelFeatured').contentEditable = isEditing;
        document.getElementById('labelGeneral').contentEditable = isEditing;

        featured.forEach((item, i) => fg.appendChild(createItem(item, i, 'feat')));
        general.forEach((item, i) => gg.appendChild(createItem(item, i, 'gen')));
        
        lucide.createIcons();
        setupDragEvents();
    }

    function createItem(item, idx, type) {
        const wrap = document.createElement('div');
        wrap.className = 'link-card';
        wrap.draggable = true;
        wrap.dataset.index = idx;
        wrap.dataset.type = type;

        const finalUrl = item.url.startsWith('http') ? item.url : 'https://' + item.url;
        let domain = "google.com";
        try { domain = new URL(finalUrl).hostname; } catch(e) {}
        const iconSrc = `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;
        const fallback = "https://img.icons8.com/fluency/48/tennis.png";

        if (type === 'feat') {
            wrap.innerHTML = `<div class="ball-icon"><div class="seam seam-1"></div><div class="seam seam-2"></div><img class="icon-img" src="${iconSrc}" onerror="this.src='${fallback}'"></div>`;
        } else {
            wrap.innerHTML = `<div class="racket-icon-container"><div class="racket-head"><img class="icon-img" src="${iconSrc}" onerror="this.src='${fallback}'"></div><div class="racket-handle"></div></div>`;
        }

        const title = document.createElement('div');
        title.className = 'link-title';
        title.innerText = item.name;
        wrap.appendChild(title);

        const ctrl = document.createElement('div');
        ctrl.className = 'edit-controls';
        
        const del = document.createElement('button');
        del.className = 'edit-btn btn-del'; del.innerHTML = '×';
        del.onclick = (e) => { e.stopPropagation(); if(type === 'feat') featured.splice(idx, 1); else general.splice(idx, 1); save(); };
        
        const ed = document.createElement('button');
        ed.className = 'edit-btn'; ed.innerHTML = '✎';
        ed.onclick = (e) => {
            e.stopPropagation(); editTarget = { type, idx };
            syncModalSelect();
            document.getElementById('modalTitle').innerText = "Editar Marcador";
            document.getElementById('addName').value = item.name;
            document.getElementById('addUrl').value = item.url;
            document.getElementById('addType').value = type;
            document.getElementById('modal').style.display = 'flex';
        };

        ctrl.appendChild(del); ctrl.appendChild(ed);
        wrap.appendChild(ctrl);
        wrap.onclick = (e) => { if(!isEditing) window.open(finalUrl, '_blank'); };
        return wrap;
    }

    function setupDragEvents() {
        const grids = document.querySelectorAll('.links-grid');

        window.ondragover = (e) => {
            e.preventDefault();
            if (!draggedElement) document.body.classList.add('dragging-external');
        };
        window.ondragleave = (e) => {
            if (e.relatedTarget === null) document.body.classList.remove('dragging-external');
        };

        grids.forEach(grid => {
            grid.addEventListener('dragover', (e) => {
                e.preventDefault();
                grid.classList.add('drag-over');
                if (draggedElement) {
                    const afterElement = getDragAfterElement(grid, e.clientX, e.clientY);
                    if (afterElement == null) grid.appendChild(draggedElement);
                    else grid.insertBefore(draggedElement, afterElement);
                }
            });

            grid.addEventListener('dragleave', () => grid.classList.remove('drag-over'));

            grid.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation(); // Detener propagación para evitar que otros grids reciban el evento
                
                if (isProcessingDrop) return; // Si ya se está procesando uno, ignorar
                isProcessingDrop = true;

                grid.classList.remove('drag-over');
                document.body.classList.remove('dragging-external');

                if (draggedElement) {
                    rebuildDataFromDOM();
                    save();
                } else {
                    // Procesar enlace externo solo una vez
                    let url = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
                    if (url) {
                        url = url.split('\n')[0].trim();
                        if (url.startsWith('http') || url.includes('.')) {
                            let name = "Nuevo Enlace";
                            try { name = new URL(url.startsWith('http') ? url : 'https://' + url).hostname.replace('www.', ''); } catch(err) {}
                            const type = grid.dataset.type;
                            if(type === 'feat') featured.push({ name, url });
                            else general.push({ name, url });
                            save();
                        }
                    }
                }

                // Desbloquear después de un breve instante
                setTimeout(() => { isProcessingDrop = false; }, 100);
            });
        });

        document.querySelectorAll('.link-card').forEach(card => {
            card.addEventListener('dragstart', (e) => {
                draggedElement = card;
                card.classList.add('dragging');
                e.dataTransfer.effectAllowed = "move";
            });
            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
                draggedElement = null;
            });
        });
    }

    function getDragAfterElement(container, x, y) {
        const draggableElements = [...container.querySelectorAll('.link-card:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offsetX = x - box.left - box.width / 2;
            const offsetY = y - box.top - box.height / 2;
            const distance = Math.sqrt(offsetX*offsetX + offsetY*offsetY);
            if (distance < closest.offset) return { offset: distance, element: child };
            else return closest;
        }, { offset: Number.POSITIVE_INFINITY }).element;
    }

    function rebuildDataFromDOM() {
        const newFeat = [];
        const newGen = [];
        
        document.querySelectorAll('#gridFeatured .link-card').forEach(card => {
            const idx = parseInt(card.dataset.index);
            const list = card.dataset.type === 'feat' ? featured : general;
            if(list[idx]) newFeat.push(list[idx]);
        });
        
        document.querySelectorAll('#gridGeneral .link-card').forEach(card => {
            const idx = parseInt(card.dataset.index);
            const list = card.dataset.type === 'feat' ? featured : general;
            if(list[idx]) newGen.push(list[idx]);
        });

        featured = newFeat;
        general = newGen;
    }

    function save() {
        localStorage.setItem('jm_p_feat', JSON.stringify(featured));
        localStorage.setItem('jm_p_gen', JSON.stringify(general));
        localStorage.setItem('jm_p_labels', JSON.stringify(sectionLabels));
        render();
    }

    function exportCurrentState() {
        const blob = new Blob([document.documentElement.outerHTML], {type: 'text/html'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'padel_pro_arena.html'; a.click();
    }

    function syncModalSelect() {
        const select = document.getElementById('addType');
        select.innerHTML = `<option value="feat">${sectionLabels.feat}</option><option value="gen">${sectionLabels.gen}</option>`;
    }

    document.getElementById('labelFeatured').addEventListener('blur', function() {
        if(sectionLabels.feat !== this.innerText) { sectionLabels.feat = this.innerText; save(); }
    });
    document.getElementById('labelGeneral').addEventListener('blur', function() {
        if(sectionLabels.gen !== this.innerText) { sectionLabels.gen = this.innerText; save(); }
    });

    document.getElementById('toggleEdit').onclick = function() {
        isEditing = !isEditing;
        this.innerText = isEditing ? "Finalizar" : "Editar Panel";
        this.style.background = isEditing ? "var(--ball-color)" : "rgba(255,255,255,0.15)";
        this.style.color = isEditing ? "var(--padel-blue)" : "white";
        render();
    };

    document.getElementById('mainSearch').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const val = e.target.value.trim();
            if (val.includes('.') && !val.includes(' ')) window.open(val.startsWith('http') ? val : 'https://' + val, '_blank');
            else window.open(`https://www.google.com/search?q=${encodeURIComponent(val)}`, '_blank');
        }
    });

    document.getElementById('openAdd').onclick = () => {
        syncModalSelect();
        document.getElementById('modalTitle').innerText = "Nuevo Marcador";
        document.getElementById('addName').value = '';
        document.getElementById('addUrl').value = '';
        document.getElementById('modal').style.display = 'flex';
    };

    document.getElementById('saveBtn').onclick = () => {
        const name = document.getElementById('addName').value;
        const url = document.getElementById('addUrl').value;
        const type = document.getElementById('addType').value;
        if(name && url) {
            if(editTarget) {
                if(editTarget.type === 'feat') featured.splice(editTarget.idx, 1);
                else general.splice(editTarget.idx, 1);
            }
            if(type === 'feat') featured.push({name, url});
            else general.push({name, url});
            save(); closeModal();
        }
    };

    function closeModal() { document.getElementById('modal').style.display = 'none'; editTarget = null; }
    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
    }
    
    setInterval(updateTime, 1000); 
    updateTime(); 
    render();
</script>

</body></html>
