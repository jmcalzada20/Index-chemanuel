    let sectionLabels = {
    "feat": "Favoritos",
    "gen": "Aplicaciones"
};
    /* FIN DATOS */

    let isEditing = false;
    let editTarget = null;
    let draggedElement = null;
    let currentIconBase64 = "";

    function render() {
        const fg = document.getElementById('gridFeatured');
        const gg = document.getElementById('gridGeneral');
        fg.innerHTML = ''; gg.innerHTML = '';
        
        document.getElementById('labelFeatured').innerText = sectionLabels.feat;
        document.getElementById('labelGeneral').innerText = sectionLabels.gen;
        document.getElementById('padelBody').classList.toggle('editing', isEditing);

        featured.forEach((item, i) => fg.appendChild(createItem(item, i, 'feat')));
        general.forEach((item, i) => gg.appendChild(createItem(item, i, 'gen')));
        
        lucide.createIcons();
        setupDragEvents();
    }

    function getAutoIcon(item) {
        if(item.icon && item.icon.trim() !== "") return item.icon;
        
        let domain = "google.com";
        try { domain = new URL(item.url.startsWith('http') ? item.url : 'https://' + item.url).hostname; } catch(e){}
        
        const nameL = item.name.toLowerCase();
        if (nameL.includes("premier")) return "https://www.google.com/s2/favicons?sz=128&domain=premierpadel.com";
        if (nameL.includes("whatsapp")) return "https://www.google.com/s2/favicons?sz=128&domain=whatsapp.com";
        if (nameL.includes("soporte")) return "https://www.google.com/s2/favicons?sz=128&domain=microsoft.com";
        if (nameL.includes("sistemas")) return "https://www.google.com/s2/favicons?sz=128&domain=office.com";
        if (nameL.includes("abono")) return "https://www.google.com/s2/favicons?sz=128&domain=abonoteatro.com";
        
        return `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;
    }

    function createItem(item, idx, type) {
        const wrap = document.createElement('div');
        wrap.className = 'link-card';
        wrap.draggable = isEditing;
        wrap.dataset.index = idx;
        wrap.dataset.type = type;

        const iconSrc = getAutoIcon(item);

        if (type === 'feat') {
            wrap.innerHTML = `<div class="ball-icon"><img class="icon-img" src="${iconSrc}"></div>`;
        } else {
            wrap.innerHTML = `
                <div class="racket-container">
                    <div class="racket-head"><img class="icon-img" src="${iconSrc}"></div>
                    <div class="racket-handle"></div>
                </div>`;
        }

        const title = document.createElement('div');
        title.className = 'link-title';
        title.innerText = item.name;
        wrap.appendChild(title);

        const ctrl = document.createElement('div');
        ctrl.className = 'edit-controls';
        
        const del = document.createElement('button');
        del.className = 'edit-btn btn-del'; del.innerText = '×';
        del.onclick = (e) => { e.stopPropagation(); if(type === 'feat') featured.splice(idx, 1); else general.splice(idx, 1); save(); };
        
        const ed = document.createElement('button');
        ed.className = 'edit-btn'; ed.innerText = '✎';
        ed.onclick = (e) => {
            e.stopPropagation(); editTarget = { type, idx };
            syncModalSelect();
            document.getElementById('addName').value = item.name;
            document.getElementById('addUrl').value = item.url;
            
            // Cargar icono existente en el preview
            currentIconBase64 = item.icon || "";
            if(currentIconBase64) {
                document.getElementById('iconPreview').src = currentIconBase64;
                document.getElementById('iconPreview').style.display = 'block';
                document.getElementById('fileNameDisplay').innerText = "Imagen cargada";
            } else {
                resetIconInputs();
            }

            document.getElementById('addType').value = type;
            document.getElementById('modal').style.display = 'flex';
        };

        ctrl.appendChild(del); ctrl.appendChild(ed);
        wrap.appendChild(ctrl);
        wrap.onclick = () => { 
            if(!isEditing) window.open(item.url.startsWith('http') ? item.url : 'https://' + item.url, '_blank'); 
        };
        return wrap;
    }

    // Lógica para manejar la subida de archivos
    document.getElementById('addFile').onchange = function(e) {
        const file = e.target.files[0];
        if(!file) return;

        const reader = new FileReader();
        reader.onload = function(event) {
            currentIconBase64 = event.target.result;
            document.getElementById('iconPreview').src = currentIconBase64;
            document.getElementById('iconPreview').style.display = 'block';
            document.getElementById('fileNameDisplay').innerText = file.name;
            document.getElementById('fileBtnLabel').innerText = "Imagen seleccionada";
        };
        reader.readAsDataURL(file);
    };

    function resetIconInputs() {
        currentIconBase64 = "";
        document.getElementById('addFile').value = "";
        document.getElementById('iconPreview').style.display = 'none';
        document.getElementById('fileNameDisplay').innerText = "";
        document.getElementById('fileBtnLabel').innerText = "Haga clic para subir una imagen";
    }

    function setupDragEvents() {
        if(!isEditing) return;
        const grids = document.querySelectorAll('.links-grid');
        grids.forEach(grid => {
            grid.ondragover = (e) => { e.preventDefault(); };
            grid.ondrop = (e) => {
                e.preventDefault();
                if (draggedElement) { rebuildDataFromDOM(); save(); }
            };
        });

        document.querySelectorAll('.link-card').forEach(card => {
            card.ondragstart = () => { draggedElement = card; card.style.opacity = '0.3'; };
            card.ondragend = () => { draggedElement = null; card.style.opacity = '1'; };
            card.ondragenter = (e) => {
                if(card !== draggedElement) {
                    const parent = card.parentNode;
                    parent.insertBefore(draggedElement, card);
                }
            };
        });
    }

    function rebuildDataFromDOM() {
        const newFeat = []; const newGen = [];
        document.querySelectorAll('#gridFeatured .link-card').forEach(c => {
            const list = c.dataset.type === 'feat' ? featured : general;
            if(list[c.dataset.index]) newFeat.push(list[c.dataset.index]);
        });
        document.querySelectorAll('#gridGeneral .link-card').forEach(c => {
            const list = c.dataset.type === 'feat' ? featured : general;
            if(list[c.dataset.index]) newGen.push(list[c.dataset.index]);
        });
        featured = newFeat; general = newGen;
    }

    function save() {
        localStorage.setItem('jm_p_feat', JSON.stringify(featured));
        localStorage.setItem('jm_p_gen', JSON.stringify(general));
        localStorage.setItem('jm_p_labels', JSON.stringify(sectionLabels));
        render();
    }

    function exportCurrentState() {
        rebuildDataFromDOM();
        const docClone = document.documentElement.cloneNode(true);
        const scriptTag = docClone.querySelector('#data-script');
        const dataBlock = `\n    /* INICIO DATOS */\n    let featured = ${JSON.stringify(featured, null, 4)};\n    let general = ${JSON.stringify(general, null, 4)};\n    let sectionLabels = ${JSON.stringify(sectionLabels, null, 4)};\n    /* FIN DATOS */`;
        scriptTag.innerHTML = scriptTag.innerHTML.replace(/\/\* INICIO DATOS \*\/[\s\S]*?\/\* FIN DATOS \*\//, dataBlock);
        docClone.querySelector('#padelBody').classList.remove('editing');
        const blob = new Blob(['<!DOCTYPE html>\n' + docClone.outerHTML], {type: 'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Padel_Pro_Arena_Custom.html'; a.click();
    }

    function syncModalSelect() {
        document.getElementById('addType').innerHTML = `<option value="feat">${sectionLabels.feat}</option><option value="gen">${sectionLabels.gen}</option>`;
    }

    document.getElementById('toggleEdit').onclick = function() {
        isEditing = !isEditing;
        this.innerText = isEditing ? "Listo" : "Organizar";
        render();
    };

    document.getElementById('openAdd').onclick = () => { 
        editTarget = null; 
        syncModalSelect(); 
        resetIconInputs();
        document.getElementById('modalTitle').innerText = "Nuevo Marcador"; 
        document.getElementById('addName').value = ''; 
        document.getElementById('addUrl').value = ''; 
        document.getElementById('modal').style.display = 'flex'; 
    };

    document.getElementById('saveBtn').onclick = () => {
        const name = document.getElementById('addName').value;
        const url = document.getElementById('addUrl').value;
        const type = document.getElementById('addType').value;
        if(name && url) {
            const newItem = { name, url, icon: currentIconBase64 };
            if(editTarget) { 
                if(editTarget.type === 'feat') featured.splice(editTarget.idx, 1); 
                else general.splice(editTarget.idx, 1); 
            }
            if(type === 'feat') featured.push(newItem); else general.push(newItem);
            save(); closeModal();
        }
    };

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function updateTime() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}); }
    
    document.getElementById('mainSearch').onkeypress = (e) => { 
        if (e.key === 'Enter') window.open(`https://www.google.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank'); 
    };

    setInterval(updateTime, 1000); 
    updateTime(); 
    render();
</script>

</body></html>
