        <div class="links-grid" id="gridFeatured" data-type="feat"><div class="link-card" draggable="false" data-index="0" data-type="feat"><div class="ball-icon"><img class="icon-img" src="https://www.google.com/s2/favicons?sz=64&amp;domain=gemini.google.com"></div><div class="link-title">Gemini</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div><div class="link-card" draggable="false" data-index="1" data-type="feat"><div class="ball-icon"><img class="icon-img" src="https://www.google.com/s2/favicons?sz=64&amp;domain=google.com"></div><div class="link-title">Google</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div><div class="link-card" draggable="false" data-index="2" data-type="feat"><div class="ball-icon"><img class="icon-img" src="https://www.google.com/s2/favicons?sz=64&amp;domain=youtube.com"></div><div class="link-title">Youtube</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div><div class="link-card" draggable="false" data-index="3" data-type="feat"><div class="ball-icon"><img class="icon-img" src="https://www.google.com/s2/favicons?sz=64&amp;domain=compras.abonoteatro.com"></div><div class="link-title">Abono</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div><div class="link-card" draggable="false" data-index="4" data-type="feat"><div class="ball-icon"><img class="icon-img" src="https://www.google.com/s2/favicons?sz=64&amp;domain=web.whatsapp.com"></div><div class="link-title">Whatsapp</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div></div>

        <div class="section-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="layers" aria-hidden="true" style="width:14px" class="lucide lucide-layers"><path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z"></path><path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12"></path><path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17"></path></svg>
            <span id="labelGeneral" spellcheck="false" contenteditable="false">APLICACIONES</span>
        </div>
        <div class="links-grid" id="gridGeneral" data-type="gen"><div class="link-card" draggable="false" data-index="0" data-type="gen">
                <div class="racket-container">
                    <div class="racket-head"><img class="icon-img" src="https://www.google.com/s2/favicons?sz=64&amp;domain=www.youtube.com"></div>
                    <div class="racket-handle"></div>
                </div><div class="link-title">Premier Pádel</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div><div class="link-card" draggable="false" data-index="1" data-type="gen">
                <div class="racket-container">
                    <div class="racket-head"><img class="icon-img" src="https://www.google.com/s2/favicons?sz=64&amp;domain=www.redbull.com"></div>
                    <div class="racket-handle"></div>
                </div><div class="link-title">Redbull</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div><div class="link-card" draggable="false" data-index="2" data-type="gen">
                <div class="racket-container">
                    <div class="racket-head"><img class="icon-img" src="https://www.google.com/s2/favicons?sz=64&amp;domain=acavalmadrid.sharepoint.com"></div>
                    <div class="racket-handle"></div>
                </div><div class="link-title">Soporte</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div><div class="link-card" draggable="false" data-index="3" data-type="gen">
                <div class="racket-container">
                    <div class="racket-head"><img class="icon-img" src="https://www.google.com/s2/favicons?sz=64&amp;domain=acavalmadrid.sharepoint.com"></div>
                    <div class="racket-handle"></div>
                </div><div class="link-title">Sistemas</div><div class="edit-controls"><button class="edit-btn btn-del">×</button><button class="edit-btn">✎</button></div></div></div>

        <div class="actions">
            <button class="btn-action" id="openAdd">Nuevo</button>
            <button class="btn-action" id="toggleEdit">Organizar</button>
        </div>
    </div>

    <div id="modal" style="display: none;">
        <div class="modal-content">
            <h3 id="modalTitle" style="margin-top:0">Nuevo Marcador</h3>
            <input type="text" id="addName" placeholder="Nombre (ej. Marca)">
            <input type="text" id="addUrl" placeholder="URL (ej. marca.com)">
            <select id="addType"><option value="feat">Favoritos</option><option value="gen">APLICACIONES</option></select>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-action" style="background:var(--padel-blue); color:white; border:none; flex:1" id="saveBtn">Guardar</button>
                <button class="btn-action" style="color:#666; border:1px solid #ccc; flex:1" onclick="closeModal()">Cancelar</button>
            </div>
        </div>
    </div>

<script id="data-script">
    
    /* INICIO DATOS */
    let featured = [
    {
        "name": "Gemini",
        "url": "https://gemini.google.com"
    },
    {
        "name": "Google",
        "url": "https://google.com"
    },
    {
        "name": "Youtube",
        "url": "https://youtube.com"
    },
    {
        "name": "Abono",
        "url": "https://compras.abonoteatro.com"
    },
    {
        "name": "Whatsapp",
        "url": "https://web.whatsapp.com/"
    }
];
    let general = [
    {
        "name": "Premier Pádel",
        "url": "https://www.youtube.com/@PremierPadelOfficial/streams"
    },
    {
        "name": "Redbull",
        "url": "https://www.redbull.com/es-es/live-events"
    },
    {
        "name": "Soporte",
        "url": "https://acavalmadrid.sharepoint.com"
    },
    {
        "name": "Sistemas",
        "url": "https://acavalmadrid.sharepoint.com/sites/SISTEMAS-TEAMS/SitePages/Sistemas%20Inicio.aspx"
    }
];
    let sectionLabels = {
    "feat": "Favoritos",
    "gen": "APLICACIONES"
};
    /* FIN DATOS */

    let isEditing = false;
    let editTarget = null;
    let draggedElement = null;

    function render() {
        const fg = document.getElementById('gridFeatured');
        const gg = document.getElementById('gridGeneral');
        fg.innerHTML = ''; gg.innerHTML = '';
        
        document.getElementById('labelFeatured').innerText = sectionLabels.feat;
        document.getElementById('labelGeneral').innerText = sectionLabels.gen;
        document.getElementById('padelBody').classList.toggle('editing', isEditing);
        document.getElementById('labelFeatured').contentEditable = isEditing;
        document.getElementById('labelGeneral').contentEditable = isEditing;

        featured.forEach((item, i) => fg.appendChild(createItem(item, i, 'feat')));
        general.forEach((item, i) => gg.appendChild(createItem(item, i, 'gen')));
        
        lucide.createIcons();
        setupDragEvents();
    }

    function createItem(item, idx, type) {
        const wrap = document.createElement('div');
        wrap.className = 'link-card';
        wrap.draggable = isEditing;
        wrap.dataset.index = idx;
        wrap.dataset.type = type;

        let domain = "google.com";
        try { domain = new URL(item.url.startsWith('http') ? item.url : 'https://' + item.url).hostname; } catch(e){}
        const iconSrc = `https://www.google.com/s2/favicons?sz=64&domain=${domain}`;

        if (type === 'feat') {
            wrap.innerHTML = `<div class="ball-icon"><img class="icon-img" src="${iconSrc}"></div>`;
        } else {
            wrap.innerHTML = `
                <div class="racket-container">
                    <div class="racket-head"><img class="icon-img" src="${iconSrc}"></div>
                    <div class="racket-handle"></div>
                </div>`;
        }

        const title = document.createElement('div');
        title.className = 'link-title';
        title.innerText = item.name;
        wrap.appendChild(title);

        const ctrl = document.createElement('div');
        ctrl.className = 'edit-controls';
        
        const del = document.createElement('button');
        del.className = 'edit-btn btn-del'; del.innerText = '×';
        del.onclick = (e) => { e.stopPropagation(); if(type === 'feat') featured.splice(idx, 1); else general.splice(idx, 1); save(); };
        
        const ed = document.createElement('button');
        ed.className = 'edit-btn'; ed.innerText = '✎';
        ed.onclick = (e) => {
            e.stopPropagation(); editTarget = { type, idx };
            syncModalSelect();
            document.getElementById('addName').value = item.name;
            document.getElementById('addUrl').value = item.url;
            document.getElementById('addType').value = type;
            document.getElementById('modal').style.display = 'flex';
        };

        ctrl.appendChild(del); ctrl.appendChild(ed);
        wrap.appendChild(ctrl);
        wrap.onclick = () => { if(!isEditing) window.open(item.url.startsWith('http') ? item.url : 'https://' + item.url, '_blank'); };
        return wrap;
    }

    function setupDragEvents() {
        if(!isEditing) return;
        const grids = document.querySelectorAll('.links-grid');
        grids.forEach(grid => {
            grid.ondragover = (e) => { e.preventDefault(); };
            grid.ondrop = (e) => {
                e.preventDefault();
                if (draggedElement) { rebuildDataFromDOM(); save(); }
            };
        });

        document.querySelectorAll('.link-card').forEach(card => {
            card.ondragstart = () => { draggedElement = card; card.style.opacity = '0.3'; };
            card.ondragend = () => { draggedElement = null; card.style.opacity = '1'; };
            card.ondragenter = (e) => {
                if(card !== draggedElement) {
                    const parent = card.parentNode;
                    parent.insertBefore(draggedElement, card);
                }
            };
        });
    }

    function rebuildDataFromDOM() {
        const newFeat = []; const newGen = [];
        document.querySelectorAll('#gridFeatured .link-card').forEach(c => {
            const list = c.dataset.type === 'feat' ? featured : general;
            if(list[c.dataset.index]) newFeat.push(list[c.dataset.index]);
        });
        document.querySelectorAll('#gridGeneral .link-card').forEach(c => {
            const list = c.dataset.type === 'feat' ? featured : general;
            if(list[c.dataset.index]) newGen.push(list[c.dataset.index]);
        });
        featured = newFeat; general = newGen;
    }

    function save() {
        localStorage.setItem('jm_p_feat', JSON.stringify(featured));
        localStorage.setItem('jm_p_gen', JSON.stringify(general));
        localStorage.setItem('jm_p_labels', JSON.stringify(sectionLabels));
        render();
    }

    function exportCurrentState() {
        rebuildDataFromDOM();
        const docClone = document.documentElement.cloneNode(true);
        const scriptTag = docClone.querySelector('#data-script');
        const dataBlock = `\n    /* INICIO DATOS */\n    let featured = ${JSON.stringify(featured, null, 4)};\n    let general = ${JSON.stringify(general, null, 4)};\n    let sectionLabels = ${JSON.stringify(sectionLabels, null, 4)};\n    /* FIN DATOS */`;
        scriptTag.innerHTML = scriptTag.innerHTML.replace(/\/\* INICIO DATOS \*\/[\s\S]*?\/\* FIN DATOS \*\//, dataBlock);
        docClone.querySelector('#padelBody').classList.remove('editing');
        const blob = new Blob(['<!DOCTYPE html>\n' + docClone.outerHTML], {type: 'text/html'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'Padel_Pro_Arena.html'; a.click();
    }

    function syncModalSelect() {
        document.getElementById('addType').innerHTML = `<option value="feat">${sectionLabels.feat}</option><option value="gen">${sectionLabels.gen}</option>`;
    }

    document.getElementById('labelFeatured').onblur = function() { sectionLabels.feat = this.innerText; save(); };
    document.getElementById('labelGeneral').onblur = function() { sectionLabels.gen = this.innerText; save(); };

    document.getElementById('toggleEdit').onclick = function() {
        isEditing = !isEditing;
        this.innerText = isEditing ? "Guardar" : "Organizar";
        render();
    };

    document.getElementById('openAdd').onclick = () => { editTarget = null; syncModalSelect(); document.getElementById('modalTitle').innerText = "Nuevo Marcador"; document.getElementById('addName').value = ''; document.getElementById('addUrl').value = ''; document.getElementById('modal').style.display = 'flex'; };
    document.getElementById('saveBtn').onclick = () => {
        const name = document.getElementById('addName').value;
        const url = document.getElementById('addUrl').value;
        const type = document.getElementById('addType').value;
        if(name && url) {
            if(editTarget) { if(editTarget.type === 'feat') featured.splice(editTarget.idx, 1); else general.splice(editTarget.idx, 1); }
            if(type === 'feat') featured.push({name, url}); else general.push({name, url});
            save(); closeModal();
        }
    };

    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function updateTime() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}); }
    
    document.getElementById('mainSearch').onkeypress = (e) => { if (e.key === 'Enter') window.open(`https://www.google.com/search?q=${encodeURIComponent(e.target.value)}`, '_blank'); };
    setInterval(updateTime, 1000); updateTime(); render();
</script>

</body></html>
