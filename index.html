<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Inteligente - Jose Manuel</title>
    <style>
        :root {
            /* Paleta Clara y Moderna */
            --bg-color: #f0f4f8;
            --accent-primary: #6366f1;
            --accent-secondary: #0ea5e9;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --card-hover: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            /* Fondo animado sutil */
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 { 
            font-weight: 500; 
            font-size: 1.2rem; 
            margin: 0; 
            letter-spacing: 1px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        #clock { 
            font-size: 4.5rem; 
            font-weight: 800; 
            margin: 5px 0;
            background: linear-gradient(135deg, var(--text-main), var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.05));
        }

        /* Buscador Moderno Claro */
        .search-area {
            position: relative;
            margin-bottom: 50px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-box {
            width: 100%;
            padding: 18px 25px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            color: var(--text-main);
            font-size: 1.1rem;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .search-box:focus {
            border-color: var(--accent-primary);
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.1);
        }

        /* Secciones */
        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-left: 10px;
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-primary);
        }

        /* Grids */
        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 40px;
        }

        @media (min-width: 600px) {
            .links-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        }

        /* Tarjetas Estilo Glassmorphism Claro */
        .link-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px 20px;
            text-decoration: none;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        .link-card:hover {
            transform: translateY(-8px);
            background: var(--card-hover);
            border-color: var(--accent-primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }

        .favicon-wrapper {
            width: 54px;
            height: 54px;
            background: #ffffff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            padding: 10px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.06);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .favicon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .link-name {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-main);
        }

        /* Controles */
        .controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
            padding: 10px 20px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn:hover {
            color: var(--accent-primary);
            background: #ffffff;
            border-color: var(--accent-primary);
        }

        /* Botón IA */
        .ai-btn-quick {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
            transition: 0.3s;
        }
        
        .ai-btn-quick:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div id="clock">00:00</div>
        <h1 id="greeting">Jose Manuel</h1>
    </header>

    <div class="search-area">
        <form action="https://www.google.com/search" method="get">
            <input type="text" name="q" id="mainSearch" class="search-box" placeholder="Buscar en la red..." autofocus>
        </form>
        <button class="ai-btn-quick" id="askAI" title="Consultar Gemini">✨</button>
    </div>

    <div class="section-header">
        <span class="section-title">Terminal de Enlaces</span>
    </div>

    <div class="controls">
        <button class="btn" id="toggleEdit">Configurar</button>
        <button class="btn" id="openAddModal">Añadir +</button>
    </div>

    <div class="links-grid" id="mainGrid">
        <!-- Los enlaces se cargan aquí -->
    </div>
</div>

<script>
    let links = JSON.parse(localStorage.getItem('jm_links_modern')) || [
        { name: "Gemini", url: "https://gemini.google.com" },
        { name: "Outlook", url: "https://outlook.cloud.microsoft/" },
        { name: "WhatsApp", url: "https://web.whatsapp.com" },
        { name: "YouTube", url: "https://www.youtube.com" },
        { name: "Soporte", url: "https://acavalmadrid.sharepoint.com/sites/SISTEMAS-TEAMS/SitePages/Soporte%20a%20Usuarios.aspx" },
        { name: "Google", url: "https://www.google.com" }
    ];

    function render() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        links.forEach((link) => {
            const domain = new URL(link.url).hostname;
            const icon = `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;
            
            const card = document.createElement('a');
            card.className = 'link-card';
            card.href = link.url;
            card.target = "_blank";
            card.innerHTML = `
                <div class="favicon-wrapper"><img src="${icon}"></div>
                <span class="link-name">${link.name}</span>
            `;
            grid.appendChild(card);
        });
    }

    function updateTime() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
        
        const hour = now.getHours();
        let greet = "Buenos días";
        if(hour >= 13) greet = "Buenas tardes";
        if(hour >= 21) greet = "Buenas noches";
        document.getElementById('greeting').innerText = `${greet}, Jose Manuel`;
    }

    setInterval(updateTime, 1000);
    updateTime();
    render();
</script>
</body>
</html>
